services:
  postgres:
    image: postgres:16-alpine
    container_name: study-club-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: study_club
      POSTGRES_USER: study_club
      POSTGRES_PASSWORD: study_club_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
