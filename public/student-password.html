<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>学员验证 - 福建省大学生研习社（福建农林大学）</title>
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>
  <div class="auth-card student-auth-card">
    <section class="auth-cover auth-cover-minimal hero-card">
      <img class="auth-cover-logo" src="./assets/study-club-logo.png" alt="研习社 Logo" />
      <h1 class="auth-cover-title">
        <span>福建省大学生研习社</span>
        <span class="auth-cover-title-sub">（福建农林大学）</span>
        <span class="student-auth-title-sub">学员积分表</span>
      </h1>
    </section>

    <section class="auth-panel hero-card">
      <div class="section-header">
        <div>
          <h2>学号验证</h2>
          <p id="student-password-message">请输入当前学号，完成登录验证。</p>
        </div>
      </div>

      <form id="student-password-form" autocomplete="off">
        <div class="field">
          <label for="student-password-name">姓名</label>
          <input id="student-password-name" readonly />
        </div>
        <div class="field">
          <label for="student-password-input">登录密码</label>
          <input
            id="student-password-input"
            type="password"
            placeholder="请输入当前学号"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
          />
        </div>
        <div class="form-actions">
          <button class="btn" id="student-password-submit" type="submit">验证并进入</button>
          <a class="btn-secondary" id="student-password-back" href="./student.html">返回上一步</a>
        </div>
      </form>
    </section>
  </div>

  <script src="./js/common.js"></script>
  <script src="./js/student-password.js"></script>
</body>
</html>
