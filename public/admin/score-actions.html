<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>成员加分</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body data-page="score-actions" data-title="成员加分" data-subtitle="请选择积分录入方式后进入对应操作页面">
  <div id="admin-shell"></div>
  <div data-admin-content hidden>
    <section class="grid-3">
      <a class="card score-option-card" href="/admin/excel-score.html">
        <div class="tag">方式一</div>
        <h2>Excel 加分</h2>
        <p>适合活动签到表、名单表导入。支持先预览识别结果，再确认入库。</p>
        <span class="btn-secondary">进入 Excel 加分</span>
      </a>

      <a class="card score-option-card" href="/admin/paste-score.html">
        <div class="tag">方式二</div>
        <h2>粘贴名单加分</h2>
        <p>适合临时活动或快速补录。支持换行、空格、顿号、逗号等分隔识别。</p>
        <span class="btn-secondary">进入粘贴名单加分</span>
      </a>

      <a class="card score-option-card" href="/admin/manual-score.html">
        <div class="tag">方式三</div>
        <h2>手动加减分</h2>
        <p>适合补分、扣分、纠错等特殊情况，所有变动都会同步写入积分日志。</p>
        <span class="btn-secondary">进入手动加减分</span>
      </a>
    </section>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/admin-common.js"></script>
</body>
</html>
