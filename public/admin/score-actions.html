<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>积分管理</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body data-page="score-actions" data-title="积分管理" data-subtitle="请选择积分录入方式后进入对应操作页面">
  <div id="admin-shell"></div>
  <div data-admin-content hidden>
    <section class="grid-3">
      <a class="card score-option-card" href="/admin/excel-score.html">
        <div class="tag">方式一</div>
        <h2>Excel 加分</h2>
        <span class="btn-secondary">进入 Excel 加分</span>
      </a>

      <a class="card score-option-card" href="/admin/paste-score.html">
        <div class="tag">方式二</div>
        <h2>粘贴名单加分</h2>
        <span class="btn-secondary">进入粘贴名单加分</span>
      </a>

      <a class="card score-option-card" href="/admin/manual-score.html">
        <div class="tag">方式三</div>
        <h2>手动加减分</h2>
        <span class="btn-secondary">进入手动加减分</span>
      </a>
    </section>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/admin-common.js"></script>
</body>
</html>
