<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>候选名单管理</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body data-page="candidates" data-title="候选名单管理页" data-subtitle="管理前台报名记录，维护状态、备注并导出完整报名表">
  <div id="admin-shell"></div>
  <div data-admin-content hidden>
    <section class="split-panel">
      <div class="card">
        <div class="section-header">
          <div>
            <h2>报名记录列表</h2>
            <p>点击某条记录后可在右侧更新状态、备注和联系方式</p>
          </div>
          <a class="btn-secondary" href="/api/admin/candidates/export">导出完整报名表 Excel</a>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>姓名</th>
                <th>学号</th>
                <th>专业 / 班级</th>
                <th>手机号</th>
                <th>状态</th>
                <th>报名时间</th>
              </tr>
            </thead>
            <tbody id="candidate-table-body"></tbody>
          </table>
        </div>
      </div>

      <aside class="card detail-card">
        <div class="section-header">
          <div>
            <h2 id="candidate-form-title">请选择一条报名记录</h2>
            <p>当前页面用于维护候选名单</p>
          </div>
        </div>
        <form id="candidate-form">
          <div class="field">
            <label for="candidate-status">处理状态</label>
            <select id="candidate-status">
              <option value="PENDING">待处理</option>
              <option value="APPROVED">已通过</option>
              <option value="REJECTED">已拒绝</option>
            </select>
          </div>
          <div class="field page-section">
            <label for="candidate-major">专业 / 班级</label>
            <input id="candidate-major" placeholder="可补充或修正" />
          </div>
          <div class="field page-section">
            <label for="candidate-phone">手机号</label>
            <input id="candidate-phone" placeholder="便于联系" />
          </div>
          <div class="field page-section">
            <label for="candidate-note">备注</label>
            <textarea id="candidate-note" placeholder="例如：适合宣传组 / 需要电话沟通"></textarea>
          </div>
          <div class="form-actions">
            <button class="btn" id="candidate-save-btn" type="submit">保存修改</button>
            <button class="btn-secondary" id="candidate-reset-btn" type="button">清空选择</button>
            <button class="btn-danger" id="candidate-delete-btn" type="button">删除记录</button>
          </div>
        </form>
      </aside>
    </section>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/admin-common.js"></script>
  <script src="/js/candidates.js"></script>
</body>
</html>
