<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>学员登录 - 福建省大学生研习社（福建农林大学）</title>
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>
  <div class="auth-card student-auth-card">
    <section class="auth-cover auth-cover-minimal hero-card">
      <img class="auth-cover-logo" src="./assets/study-club-logo.png" alt="研习社 Logo" />
      <h1 class="auth-cover-title">
        <span>福建省大学生研习社</span>
        <span class="auth-cover-title-sub">（福建农林大学）</span>
        <span class="student-auth-title-sub">学员积分表</span>
      </h1>
    </section>

    <section class="auth-panel hero-card">
      <div class="section-header">
        <div>
          <h2>学员登录</h2>
        </div>
      </div>

      <form id="student-query-form" autocomplete="off">
        <div class="field">
          <label for="student-query-input">姓名</label>
          <input id="student-query-input" placeholder="请输入姓名" />
        </div>
        <div class="form-actions">
          <button class="btn" id="student-query-submit" type="submit">进入积分表</button>
          <a class="btn-secondary" href="../index.html">返回身份入口</a>
        </div>
      </form>
    </section>
  </div>
  <script src="./js/common.js"></script>
  <script src="./js/student-login.js"></script>
</body>
</html>
