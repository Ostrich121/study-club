<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理员登录 - 福建省习近平新时代中国特色社会主义思想大学生研习社（福建农林大学）</title>
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>
  <div class="auth-card">
    <section class="auth-cover auth-cover-minimal hero-card">
      <img class="auth-cover-logo" src="./assets/study-club-logo.png" alt="研习社 Logo" />
      <h1 class="auth-cover-title">
        <span>福建省大学生研习社</span>
        <span class="auth-cover-title-sub">（福建农林大学）</span>
      </h1>
    </section>

    <section class="auth-panel hero-card">
      <div class="section-header">
        <div>
          <h2>管理员登录</h2>
          <p>当前版本为单管理员模式，只需输入管理密码即可进入专题后台。</p>
        </div>
      </div>

      <form id="login-form" autocomplete="off">
        <div class="field">
          <label for="password">管理密码</label>
          <input id="password" name="password" type="password" placeholder="请输入管理密码" autocomplete="off" autocapitalize="off" spellcheck="false" />
        </div>
        <div class="form-actions">
          <button class="btn" id="login-submit" type="submit">进入后台</button>
          <a class="btn-secondary" href="../index.html">返回身份入口</a>
        </div>
      </form>
    </section>
  </div>

  <script src="./js/common.js"></script>
  <script src="./js/login.js"></script>
</body>
</html>
