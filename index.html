<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>福建省习近平新时代中国特色社会主义思想大学生研习社（福建农林大学）身份入口</title>
  <link rel="stylesheet" href="./public/css/app.css" />
</head>
<body class="portal-page">
  <div class="page-shell portal-page-shell">
    <section class="portal-entry-shell" id="portal-entry-shell">
      <div class="portal-entry-card">
        <div class="portal-logo-stage">
          <img class="portal-logo" src="./public/assets/study-club-logo-web.png" alt="研习社 Logo" />
        </div>
        <h1 class="portal-title">
          <span class="portal-title-campus">福建省</span>
          <span class="portal-title-theme">习近平新时代中国特色社会主义思想</span>
          <span class="portal-title-club">大学生研习社</span>
          <span class="portal-title-club-sub">（福建农林大学）</span>
        </h1>

        <div class="portal-role-grid" aria-label="身份选择">
          <button class="btn portal-role-btn" id="student-role-btn" type="button">学员</button>
          <button class="btn-secondary portal-role-btn" id="admin-role-btn" type="button">管理员</button>
        </div>
      </div>
    </section>
  </div>

  <script src="./public/js/portal-entry.js"></script>
</body>
</html>
